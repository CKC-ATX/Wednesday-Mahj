<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Mahjong RSVP</title>
    <style>
        :root {
            --primary: #2c6e49;
            --primary-light: #4c956c;
            --accent: #fefee3;
            --coming: #4caf50;
            --not-coming: #f44336;
            --tbd: #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background-color: white;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px 5px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }
        button.coming { background-color: var(--coming); }
        button.not { background-color: var(--not-coming); }
        button.tbd { background-color: var(--tbd); }
        button:hover { opacity: 0.9; }

        .dashboard {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: var(--accent);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e6e6bd;
        }

        .stat-box { text-align: center; font-weight: bold; }
        .stat-count { font-size: 24px; display: block; }

        .player-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🀄 Mahj Weekly RSVP</h1>
    
    <div class="form-group">
        <label for="player-select">Select Your Name:</label>
        <select id="player-select">
            <option value="">-- Choose Name --</option>
            <option value="Alice">Alice</option>
            <option value="Barbara">Barbara</option>
            <option value="Carol">Carol</option>
            <option value="Diane">Diane</option>
            <option value="Eleanor">Eleanor</option>
        </select>
    </div>

    <label>Your Status for this Week:</label>
    <div class="btn-group">
        <button class="coming" onclick="submitRSVP('Coming')">In</button>
        <button class="not" onclick="submitRSVP('Out')">Out</button>
        <button class="tbd" onclick="submitRSVP('TBD')">TBD</button>
    </div>

    <div class="dashboard">
        <h2>Headcount Dashboard</h2>
        <div class="stats">
            <div class="stat-box" style="color: var(--coming);">In<span class="stat-count" id="count-in">0</span></div>
            <div class="stat-box" style="color: var(--not-coming);">Out<span class="stat-count" id="count-out">0</span></div>
            <div class="stat-box" style="color: var(--tbd);">TBD<span class="stat-count" id="count-tbd">0</span></div>
        </div>
        <ul class="player-list" id="attendance-list">
            </ul>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ⚠️ REPLACE THIS WITH YOUR OWN FIREBASE CONFIGURATION
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Make function available to the buttons globally
    window.submitRSVP = function(status) {
        const name = document.getElementById('player-select').value;
        if (!name) {
            alert('Please select your name first!');
            return;
        }
        
        // Save to Firebase
        set(ref(db, 'attendance/' + name), {
            status: status,
            timestamp: Date.now()
        }).then(() => {
            alert(`Thanks ${name}! Status saved as: ${status}`);
        }).catch((error) => {
            alert('Error updating status: ' + error.message);
        });
    }

    // Listen for real-time updates from Firebase
    const attendanceRef = ref(db, 'attendance');
    onValue(attendanceRef, (snapshot) => {
        const data = snapshot.val() || {};
        updateDashboard(data);
    });

    function updateDashboard(data) {
        const listContainer = document.getElementById('attendance-list');
        listContainer.innerHTML = ''; // Clear list

        let counts = { 'Coming': 0, 'Out': 0, 'TBD': 0 };

        // Loop through data and build UI
        Object.keys(data).sort().forEach(player => {
            const status = data[player].status;
            counts[status]++;

            const li = document.createElement('li');
            li.className = 'player-item';
            
            let badgeColor = 'var(--tbd)';
            if(status === 'Coming') badgeColor = 'var(--coming)';
            if(status === 'Out') badgeColor = 'var(--not-coming)';

            li.innerHTML = `
                <span>${player}</span>
                <span class="status-badge" style="background-color: ${badgeColor}">${status}</span>
            `;
            listContainer.appendChild(li);
        });

        // Update total counter numbers
        document.getElementById('count-in').innerText = counts['Coming'];
        document.getElementById('count-out').innerText = counts['Out'];
        document.getElementById('count-tbd').innerText = counts['TBD'];
    }
</script>
</body>
</html>
